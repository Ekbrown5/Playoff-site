    body {
      background-image: url("playoffbanner.png");

      margin: 0;
      display: flex;

      color: black;
      font-family: Arial, sans-serif;
      background-color: rgba(0, 0, 0, 0.5);
      position: relative;
      padding: 20px;
      flex-direction: column;
    }
    

    h1 {
      position: absolute;
      top: 20px;
      /* Adjust the top position as needed */
      left: 50%;
      transform: translateX(-50%);
      color: black;
      font-size: 60px;
      font-family: Montserrat;
      border: 3px solid Gold;
      border-radius: 10px;
      background-color: rgba(255, 255, 255, 0.6);
      z-index: 1;
    }

    h2 {
      color: rgb(255, 255, 255);
      text-align: center;
      font-size: 25px;
      font-family: Montserrat;
      border: 2px solid gold;
      border-radius: 10px;
      background-color: rgb(0, 0, 0);
      line-height: 2;

    }

    h3 {
      color: black;
      text-align: center;
      font-size: 60px;
      font-family: Montserrat;
     
   
    
      margin-top: 190px;
    }

    Owner Eric Brown h4 {
      color: black;
      text-align: center;
      font-size: 60px;
      font-family: Montserrat;
      border: 2px solid Gold;
      border-radius: 20px;
      background-color: rgba(255, 255, 255, 0.6);
      margin-top: 5px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background-color: rgba(255, 255, 255, .80);
      /* Adjust the color and transparency level */
      /* Adjust the margin-top to create space between h1 and table */
      margin-top: 250px;
      margin-bottom: 80px;
      border-radius: 20px;

    }

    table,
    th,
    td {
      border: 2px solid black;
      margin-top: 200px;
      margin-bottom: 200px;
    }

    th,
    td {
      text-align: center;
    }

    th {
      background-color: gold;

    }

    .team-logo {
      width: 55px;
      height: auto;
    }

    @media only screen and (max-width: 600px) {

      /* CSS rules for screens smaller than 600px (e.g., smartphones) */
      h1 {
        font-size: 30px;
      }

      table {
        margin-top: 200px;
        margin-bottom: 100px;
        width: 100%
      }

      .team-logo {
        width: 20px;
      }

    }

    button {
      font-size: 70px;
      border-radius: 20px;
      border-color: black;


    }

    span {

      font-size: 30px;
      color: rgb(0, 0, 0)
    }

    .match {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .team {
      display: flex;
      align-items: center;
    }

    .team img {
      width: 140px;
      height: 130px;
      margin-right: 10px;
    }

    .result {
      font-size: 40px;
    }
  </style>
